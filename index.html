<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sales Report Application</title>
    
    <!-- นำเข้าฟอนต์แบบ Link พร้อม crossorigin เพื่อแก้ปัญหา html-to-image อ่าน cssRules ไม่ได้ (CORS SecurityError) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SheetJS (for parsing Excel/CSV) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- html-to-image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        
        /* สไตล์ตารางแบบดั้งเดิม ให้เบราว์เซอร์จัดกึ่งกลางเองตามธรรมชาติ */
        table { border-collapse: collapse; width: 100%; }
        td, th { vertical-align: middle; }
        
        /* Hide scrollbar for clean dashboard */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ระบบ Icon ที่ปลอดภัยกับ React (Inline SVG) แก้ปัญหาหน้าจอขาวโพลน ---
        const icons = {
            'bar-chart-2': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
            'refresh-cw': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            'copy': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
            'download': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            'file-spreadsheet': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            'link': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            'users': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            'trash-2': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            'lock': <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const Icon = ({ name, className }) => {
            const svg = icons[name];
            if (!svg) return null;
            return React.cloneElement(svg, { className });
        };

        // --- Mock Data ---
        const initialEmployees = [
            { id: 1, name: "ภัทยา (ปอนด์)" }, { id: 2, name: "สุเทพ (เทพ)" },
            { id: 3, name: "ณาตฏิกา (ณาต)" }, { id: 4, name: "ฐิติญา (ออย)" },
            { id: 5, name: "ธนัท (ตี้)" }, { id: 6, name: "ธัญญ์ชยา (ตูน)" },
            { id: 7, name: "ณัฐกฤตา (พู่กัน)" }, { id: 8, name: "ภัทรธิดา (หมวย)" },
            { id: 9, name: "อำนาจ (เค)" }
        ];

        const mockDashboardData = {
            curtain: [
                { name: "ฐิติญา (ออย)", amount: 281920.00 },
                { name: "สุเทพ (เทพ)", amount: 192682.00 },
                { name: "ณาตฏิกา (ณาต)", amount: 139795.00 },
                { name: "ธัญญ์ชยา (ตูน)", amount: 28642.00 },
                { name: "ณัฐกฤตา (พู่กัน)", amount: 19747.00 },
                { name: "ภัทยา (ปอนด์)", amount: 15500.00 },
                { name: "ธนัท (ตี้)", amount: 10200.00 },
                { name: "ภัทรธิดา (หมวย)", amount: 8000.00 }
            ],
            curtainFabric: [
                { name: "ฐิติญา (ออย)", amount: 7656.00 }
            ],
            material: [
                { name: "Jaruporn (อาย)", amount: 805135.50 },
                { name: "Nalinee (จ้อ)", amount: 795610.55 },
                { name: "Vipada (วี)", amount: 610514.73 },
                { name: "Panya (เก้า)", amount: 261468.83 },
                { name: "Chidthep (ใหม่)", amount: 212498.75 }
            ],
            project: [
                { name: "Panya (เก้า)", amount: 594454.90 },
                { name: "Nattawut (นัท)", amount: 398953.00 },
                { name: "Kanyanut (โบตั๋น)", amount: 18175.00 },
                { name: "Vipada (วี)", amount: 4210.00 },
                { name: "Nalinee (จ้อ)", amount: 980.00 }
            ]
        };

        // --- Main App Component ---
        function App() {
            // โครงสร้าง State ทั้งหมดรวมไว้ที่จุดเดียวเพื่อป้องกันแอปล่ม
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [employees, setEmployees] = useState(initialEmployees);
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('gasUrl') || '');
            const [isLoading, setIsLoading] = useState(false);
            const [dashboardData, setDashboardData] = useState(mockDashboardData);
            
            // Upload State
            const [file, setFile] = useState(null);
            const [previewData, setPreviewData] = useState([]);
            
            // Settings State
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [newEmp, setNewEmp] = useState('');

            const dashboardRef = useRef(null);
            
            // --- Helper Functions ---
            const formatCurrency = (num) => {
                return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            const getMonthYearString = (date) => {
                const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                const yy = date.getFullYear().toString().slice(-2);
                return `${months[date.getMonth()]}${yy}`;
            };

            const getDisplayDateRange = (selectedDate) => {
                const now = new Date();
                const selYear = selectedDate.getFullYear();
                const selMonth = selectedDate.getMonth();
                
                const curYear = now.getFullYear();
                const curMonth = now.getMonth();
                const curDate = now.getDate();

                let endDayStr = "01";

                if (selYear < curYear || (selYear === curYear && selMonth < curMonth)) {
                    const lastDay = new Date(selYear, selMonth + 1, 0).getDate();
                    endDayStr = String(lastDay).padStart(2, '0');
                } else if (selYear === curYear && selMonth === curMonth) {
                    endDayStr = String(curDate).padStart(2, '0');
                } else {
                    endDayStr = "01";
                }

                const startStr = "01";
                const monthStr = String(selMonth + 1).padStart(2, '0');
                const yearStr = selYear.toString().slice(-2);

                return `${startStr}-${endDayStr}/${monthStr}/${yearStr}`;
            };

            const calcTotal = (arr) => arr.reduce((sum, item) => sum + item.amount, 0);

            const filterKnownEmployees = (data) => {
                const normalizeStr = (str) => (str || '').replace(/[\s\(\)（）]/g, '').toLowerCase();
                const activeEmployeeNames = employees.map(emp => normalizeStr(emp.name));
                
                return data.filter(item => {
                    if (!item.name) return false;
                    return activeEmployeeNames.includes(normalizeStr(item.name));
                });
            };

            // --- Handlers ---
            const handleMonthChange = (e) => {
                const [year, month] = e.target.value.split('-');
                setSelectedDate(new Date(year, month - 1, 1));
                setDashboardData({ curtain: [], curtainFabric: [], material: [], project: [] });
            };

            const fetchDashboardData = async () => {
                if (!gasUrl) {
                    alert('กำลังแสดงข้อมูลตัวอย่าง กรุณาตั้งค่า Google Apps Script URL ในหน้าตั้งค่าเพื่อดึงข้อมูลจริง');
                    return;
                }
                setIsLoading(true);
                try {
                    const monthStr = getMonthYearString(selectedDate);
                    const timestamp = new Date().getTime();
                    const response = await fetch(`${gasUrl}?action=getDashboard&month=${monthStr}&t=${timestamp}`, {
                        cache: 'no-store'
                    });
                    const result = await response.json();
                    if(result.status === 'success') {
                        setDashboardData(result.data);
                    } else {
                        alert('เกิดข้อผิดพลาดในการดึงข้อมูล: ' + result.message);
                    }
                } catch (error) {
                    console.error(error);
                    alert('ไม่สามารถเชื่อมต่อกับ Google Apps Script ได้');
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                if(activeTab === 'dashboard') {
                    if (gasUrl) {
                        fetchDashboardData();
                    } else {
                        setDashboardData(mockDashboardData);
                    }
                }
            }, [activeTab, selectedDate]);

            // อัปเดตฟังก์ชัน capture รูปเพื่อแก้ไขปัญหาตกขอบซ้าย/ขวา
            const captureImage = async () => {
                const node = dashboardRef.current;
                const options = { 
                    backgroundColor: '#ffffff', 
                    pixelRatio: 2, 
                    style: { 
                        fontFamily: "'Sarabun', sans-serif",
                        margin: 0 // บังคับล้าง margin ระหว่างทำการแคปเพื่อป้องกัน offset ผิดพลาด
                    },
                    // บังคับความกว้าง/ความสูงให้ตรงกับขนาดจริงของกล่องเท่านั้น
                    width: node.offsetWidth,
                    height: node.offsetHeight
                };
                
                await window.htmlToImage.toPng(node, options);
                return await window.htmlToImage.toBlob(node, options);
            };

            const handleCopy = async () => {
                if (!dashboardRef.current) return;
                setIsLoading(true);
                try {
                    const blob = await captureImage();
                    const item = new ClipboardItem({ 'image/png': blob });
                    await navigator.clipboard.write([item]);
                    alert('คัดลอกรูปภาพลงคลิปบอร์ดแล้ว สามารถนำไปวางใน LINE ได้เลย');
                } catch (error) {
                    console.error(error);
                    alert('เบราว์เซอร์ของคุณไม่รองรับการคัดลอกรูปภาพอัตโนมัติ (หรือเกิดข้อผิดพลาด) กรุณาใช้ปุ่ม Download แทน');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDownload = async () => {
                if (!dashboardRef.current) return;
                setIsLoading(true);
                try {
                    const blob = await captureImage();
                    const dataUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `Dashboard_${getMonthYearString(selectedDate)}.png`;
                    link.href = dataUrl;
                    link.click();
                    URL.revokeObjectURL(dataUrl);
                } catch (error) {
                    console.error(error);
                    alert('เกิดข้อผิดพลาดในการดาวน์โหลด');
                } finally {
                    setIsLoading(false);
                }
            };

            const handleFileChange = async (e) => {
                const selectedFile = e.target.files[0];
                setFile(selectedFile);
                
                if(selectedFile) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, {type:'binary'});
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const data = XLSX.utils.sheet_to_json(ws, {header:1});
                        setPreviewData(data.slice(0, 50));
                    };
                    reader.readAsBinaryString(selectedFile);
                }
            };

            const handleUpload = async () => {
                if (!file) return alert("กรุณาเลือกไฟล์ก่อน");
                if (!gasUrl) return alert("กรุณาตั้งค่า Google Apps Script URL ในหน้าตั้งค่าก่อนใช้งาน");

                setIsLoading(true);
                
                try {
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        const base64Data = evt.target.result.split(',')[1];
                        const monthStr = getMonthYearString(selectedDate);
                        const sheetName = `Raw ยอดขายแต่ละวัน ${monthStr}`;

                        const payload = {
                            action: 'upload',
                            sheetName: sheetName,
                            fileName: file.name,
                            mimeType: file.type || 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                            data: base64Data
                        };

                        const response = await fetch(gasUrl, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });
                        
                        const result = await response.json();
                        if(result.status === 'success') {
                            alert(`อัพโหลดและบันทึกลงชีท ${sheetName} เรียบร้อยแล้ว`);
                            setFile(null);
                            setPreviewData([]);
                        } else {
                            alert('เกิดข้อผิดพลาด: ' + result.message);
                        }
                        setIsLoading(false);
                    };
                    reader.readAsDataURL(file);

                } catch (error) {
                    console.error(error);
                    alert('เกิดข้อผิดพลาดในการอัพโหลด');
                    setIsLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (username === 'Admin' && password === '0830614345') {
                    setIsAuthenticated(true);
                } else {
                    alert('Username หรือ Password ไม่ถูกต้อง!');
                }
            };

            const saveGasUrl = (e) => {
                const val = e.target.value;
                setGasUrl(val);
                localStorage.setItem('gasUrl', val);
            };

            const addEmployee = () => {
                if(!newEmp) return;
                setEmployees([...employees, { id: Date.now(), name: newEmp }]);
                setNewEmp('');
            };

            const deleteEmployee = (id) => {
                if(confirm('ต้องการลบพนักงานคนนี้ใช่หรือไม่?')) {
                    setEmployees(employees.filter(emp => emp.id !== id));
                }
            };

            // --- View Renderers ---
            const renderTable = (title, data) => {
                const filteredData = data.filter(item => item.amount > 0).sort((a, b) => b.amount - a.amount);
                if (filteredData.length === 0) return null;

                const total = calcTotal(filteredData);

                const baseTdStyle = {
                    padding: '6px 8px', 
                    borderBottom: '1px solid #000000',
                    fontWeight: 'bold',
                    verticalAlign: 'middle', 
                    margin: 0,
                    color: '#000000'
                };

                return (
                    <div className="mb-0 w-full" style={{ fontFamily: "'Sarabun', sans-serif" }}>
                        <div style={{
                            backgroundColor: '#a4c2f4', 
                            color: '#ffffff', 
                            textShadow: '1px 1px 2px rgba(0,0,0,0.2)', 
                            borderBottom: '1px solid #000000',
                            padding: '8px 0',
                            textAlign: 'center',
                            fontWeight: 'bold',
                            fontSize: '1.125rem'
                        }}>
                            {title}
                        </div>
                        <table style={{ width: '100%', backgroundColor: '#ffffff' }}>
                            <tbody>
                                {filteredData.map((item, index) => (
                                    <tr key={index}>
                                        <td style={{ ...baseTdStyle, width: '40px', textAlign: 'center', borderRight: '1px solid #000000' }}>
                                            {index + 1}
                                        </td>
                                        <td style={{ ...baseTdStyle, textAlign: 'left', borderRight: '1px solid #000000' }}>
                                            {item.name}
                                        </td>
                                        <td style={{ ...baseTdStyle, width: '150px', textAlign: 'right' }}>
                                            {formatCurrency(item.amount)}
                                        </td>
                                    </tr>
                                ))}
                                <tr style={{ backgroundColor: '#ffff00' }}>
                                    <td colSpan="2" style={{ ...baseTdStyle, textAlign: 'center', borderRight: '1px solid #000000' }}>
                                        Grand Total
                                    </td>
                                    <td style={{ ...baseTdStyle, textAlign: 'right' }}>
                                        {formatCurrency(total)}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-10">
                        <div className="container mx-auto flex items-center gap-2">
                            <Icon name="bar-chart-2" className="w-6 h-6" />
                            <h1 className="text-xl font-bold">Daily Sales System</h1>
                        </div>
                    </header>

                    <div className="bg-white shadow-sm border-b">
                        <div className="container mx-auto flex">
                            <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-3 font-medium border-b-2 transition-colors ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-blue-500'}`}>
                                Dashboard
                            </button>
                            <button onClick={() => setActiveTab('upload')} className={`px-6 py-3 font-medium border-b-2 transition-colors ${activeTab === 'upload' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-blue-500'}`}>
                                อัพโหลดไฟล์
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`px-6 py-3 font-medium border-b-2 transition-colors ${activeTab === 'settings' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-blue-500'}`}>
                                ตั้งค่า / พนักงาน
                            </button>
                        </div>
                    </div>

                    <main className="flex-1 container mx-auto p-4 py-8">
                        {/* 1. Dashboard View */}
                        {activeTab === 'dashboard' && (
                            <div className="max-w-xl mx-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold">Dashboard ยอดขาย</h2>
                                    <div className="flex gap-2">
                                        <button onClick={fetchDashboardData} className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 text-sm flex items-center gap-1">
                                            <Icon name="refresh-cw" className="w-4 h-4" /> อัพเดทข้อมูล
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex gap-2 mb-4">
                                    <input 
                                        type="month" 
                                        className="border rounded px-3 py-2 w-full"
                                        value={`${selectedDate.getFullYear()}-${String(selectedDate.getMonth() + 1).padStart(2, '0')}`}
                                        onChange={handleMonthChange}
                                    />
                                </div>

                                {/* ย้ายการกำหนดระยะกึ่งกลางหน้าจอ (flex) ออกมาไว้ที่กล่องข้างนอก เพื่อไม่ให้สับสนตอนแคปรูป */}
                                <div className="flex justify-center w-full">
                                    <div id="dashboard-tables" ref={dashboardRef} className="bg-white" style={{ width: '400px', border: '1px solid #000000', padding: 0, fontFamily: "'Sarabun', sans-serif" }}>
                                        <div style={{ 
                                            borderBottom: '1px solid #000000',
                                            padding: '8px 0',
                                            textAlign: 'center',
                                            fontWeight: 'bold',
                                            fontSize: '1.25rem',
                                            color: '#000000'
                                        }}>
                                            {getDisplayDateRange(selectedDate)}
                                        </div>
                                        
                                        {renderTable("Curtain", filterKnownEmployees(dashboardData.curtain))}
                                        {renderTable("Curtain - Fabric / Bedding", filterKnownEmployees(dashboardData.curtainFabric))}
                                        {renderTable("Material", dashboardData.material)}
                                        {renderTable("Project", dashboardData.project)}
                                    </div>
                                </div>

                                <div className="flex justify-center gap-4 mt-6">
                                    <button onClick={handleCopy} disabled={isLoading} className="bg-green-500 text-white px-6 py-2 rounded shadow flex items-center gap-2 hover:bg-green-600">
                                        {isLoading ? 'กำลังประมวลผล...' : <><Icon name="copy" className="w-5 h-5" /> คัดลอกรูปลง Line</>}
                                    </button>
                                    <button onClick={handleDownload} disabled={isLoading} className="bg-blue-500 text-white px-6 py-2 rounded shadow flex items-center gap-2 hover:bg-blue-600">
                                        <Icon name="download" className="w-5 h-5" /> บันทึกรูปภาพ
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 2. Upload View */}
                        {activeTab === 'upload' && (
                            <div className="max-w-2xl mx-auto bg-white p-6 rounded shadow">
                                <h2 className="text-xl font-bold mb-4">อัพโหลด Daily Sales Report</h2>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-1">ระบุเดือนที่จะบันทึกข้อมูล (ข้อมูลจะถูกบันทึกลงชีทตามเดือนนี้)</label>
                                    <input 
                                        type="month" 
                                        className="border rounded px-3 py-2 w-full max-w-xs"
                                        value={`${selectedDate.getFullYear()}-${String(selectedDate.getMonth() + 1).padStart(2, '0')}`}
                                        onChange={handleMonthChange}
                                    />
                                    <p className="text-sm text-gray-500 mt-1">
                                        ชื่อชีทที่จะบันทึก: <span className="font-bold text-blue-600">Raw ยอดขายแต่ละวัน {getMonthYearString(selectedDate)}</span>
                                    </p>
                                </div>

                                <div className="border-2 border-dashed border-gray-300 rounded p-6 text-center mb-4">
                                    <input type="file" id="fileUpload" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileChange} />
                                    <label htmlFor="fileUpload" className="cursor-pointer flex flex-col items-center">
                                        <Icon name="file-spreadsheet" className="w-12 h-12 text-green-500 mb-2" />
                                        <span className="text-blue-500 font-medium">คลิกเพื่อเลือกไฟล์ Excel/CSV</span>
                                        <span className="text-sm text-gray-400 mt-1">{file ? file.name : "ยังไม่ได้เลือกไฟล์"}</span>
                                    </label>
                                </div>

                                {previewData.length > 0 && (
                                    <div className="mb-4">
                                        <h3 className="font-medium text-sm mb-2 text-gray-600">ตัวอย่างข้อมูล (แสดงสูงสุด 50 แถวแรก)</h3>
                                        <div className="overflow-x-auto max-h-64 border rounded">
                                            <table className="min-w-full text-xs bg-white">
                                                <tbody>
                                                    {previewData.map((row, i) => (
                                                        <tr key={i} className="border-b">
                                                            {row.map((cell, j) => <td key={j} className="p-1 px-2 border-r truncate max-w-xs">{cell}</td>)}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                <button 
                                    onClick={handleUpload} 
                                    disabled={!file || isLoading}
                                    className={`w-full py-3 rounded font-bold text-white transition ${(!file || isLoading) ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-lg'}`}
                                >
                                    {isLoading ? 'กำลังอัพโหลด...' : 'ยืนยันการบันทึกลง Google Sheet'}
                                </button>
                            </div>
                        )}

                        {/* 3. Settings View (with Authentication) */}
                        {activeTab === 'settings' && !isAuthenticated && (
                            <div className="max-w-md mx-auto bg-white p-8 rounded shadow mt-10">
                                <div className="text-center mb-6">
                                    <Icon name="lock" className="w-12 h-12 text-blue-500 mx-auto mb-2" />
                                    <h2 className="text-2xl font-bold">เข้าสู่ระบบจัดการ</h2>
                                    <p className="text-gray-500 text-sm">เฉพาะผู้ดูแลระบบ (Admin) เท่านั้น</p>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Username</label>
                                        <input 
                                            type="text" 
                                            value={username} 
                                            onChange={(e) => setUsername(e.target.value)} 
                                            className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300 outline-none" 
                                            required 
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-1">Password</label>
                                        <input 
                                            type="password" 
                                            value={password} 
                                            onChange={(e) => setPassword(e.target.value)} 
                                            className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300 outline-none" 
                                            required 
                                        />
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700 transition">
                                        เข้าสู่ระบบ
                                    </button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'settings' && isAuthenticated && (
                            <div className="max-w-2xl mx-auto space-y-6">
                                <div className="bg-white p-6 rounded shadow border-t-4 border-blue-500">
                                    <h2 className="text-xl font-bold mb-4 border-b pb-2 flex items-center gap-2">
                                        <Icon name="link" className="w-5 h-5 text-blue-500" /> การเชื่อมต่อ Google Sheets
                                    </h2>
                                    <p className="text-sm text-gray-600 mb-2">
                                        วาง Web App URL ที่นี่ (ระบบจะจำไว้ในเครื่องอัตโนมัติ)
                                    </p>
                                    <input 
                                        type="text" 
                                        value={gasUrl} 
                                        onChange={saveGasUrl} 
                                        placeholder="https://script.google.com/macros/s/..."
                                        className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-300 outline-none"
                                    />
                                </div>

                                <div className="bg-white p-6 rounded shadow border-t-4 border-green-500">
                                    <div className="flex justify-between items-center mb-4 border-b pb-2">
                                        <h2 className="text-xl font-bold flex items-center gap-2">
                                            <Icon name="users" className="w-5 h-5 text-green-500" /> จัดการรายชื่อพนักงาน (ส่วนที่ 1-2)
                                        </h2>
                                        <button onClick={() => setIsAuthenticated(false)} className="text-sm text-red-500 hover:underline">
                                            ออกจากระบบ (Logout)
                                        </button>
                                    </div>
                                    <div className="flex gap-2 mb-4">
                                        <input 
                                            type="text" 
                                            value={newEmp}
                                            onChange={(e)=>setNewEmp(e.target.value)}
                                            placeholder="เพิ่มชื่อพนักงานใหม่ เช่น สมชาย (ชาย)"
                                            className="flex-1 border p-2 rounded"
                                        />
                                        <button onClick={addEmployee} className="bg-green-500 text-white px-4 py-2 rounded">เพิ่ม</button>
                                    </div>
                                    <ul className="divide-y border rounded">
                                        {employees.map((emp, i) => (
                                            <li key={emp.id} className="p-3 flex justify-between items-center hover:bg-gray-50">
                                                <span>{i+1}. {emp.name}</span>
                                                <button onClick={() => deleteEmployee(emp.id)} className="text-red-500 hover:bg-red-50 p-1 rounded">
                                                    <Icon name="trash-2" className="w-4 h-4" />
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        )}
                    </main>

                    {isLoading && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white p-4 rounded shadow-lg flex items-center gap-3">
                                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                                <span className="font-medium">กำลังประมวลผล...</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
